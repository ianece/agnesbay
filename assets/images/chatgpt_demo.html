<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Music Reactor Prototype</title>
<style>
  body {
    margin: 0;
    background: #221A0C; /* ink */
    overflow: hidden;
  }
</style>
</head>
<body>

<script type="module">
import * as THREE from 'https://cdn.skypack.dev/three';

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.z = 2;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// --- DEBUG fallback (so you always see something) ---
const debugGeo = new THREE.SphereGeometry(0.2, 16, 16);
const debugMat = new THREE.MeshBasicMaterial({ wireframe: true, color: 0xC8A84B });
const debugMesh = new THREE.Mesh(debugGeo, debugMat);
scene.add(debugMesh);

// --- Load your image ---
const img = new Image();
img.src = "./input.jpg"; // 👈 your image file

img.onload = () => {
  scene.remove(debugMesh); // remove debug once working

  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  const SIZE = 200;
  canvas.width = SIZE;
  canvas.height = SIZE;

  ctx.drawImage(img, 0, 0, SIZE, SIZE);

  const data = ctx.getImageData(0, 0, SIZE, SIZE).data;

  const points = [];

  for (let y = 0; y < SIZE; y += 2) {
    for (let x = 0; x < SIZE; x += 2) {

      const i = (y * SIZE + x) * 4;

      const r = data[i];
      const g = data[i+1];
      const b = data[i+2];

      const brightness = (r + g + b) / 3;

      // --- boost contrast HARD ---
      if (brightness < 40) continue;

      const z = Math.pow(brightness / 255, 2) * 0.8;

      points.push(
        (x - SIZE/2) / SIZE,
        -(y - SIZE/2) / SIZE,
        z
      );
    }
  }

  const geometry = new THREE.BufferGeometry();
  geometry.setAttribute('position', new THREE.Float32BufferAttribute(points, 3));

  const material = new THREE.PointsMaterial({
    color: 0xC8A84B,
    size: 0.015
  });

  const mesh = new THREE.Points(geometry, material);
  scene.add(mesh);

  // --- Audio ---
  const audioCtx = new AudioContext();
  const analyser = audioCtx.createAnalyser();
  analyser.fftSize = 128;

  navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
    const source = audioCtx.createMediaStreamSource(stream);
    source.connect(analyser);
  });

  const dataArray = new Uint8Array(analyser.frequencyBinCount);

  function animate() {
    requestAnimationFrame(animate);

    analyser.getByteFrequencyData(dataArray);
    const bass = dataArray[2] / 255;

    const pos = geometry.attributes.position.array;

    for (let i = 0; i < pos.length; i += 3) {
      pos[i+2] += Math.sin(i * 0.01 + performance.now() * 0.002) * 0.002;
      pos[i+2] += bass * 0.03;
    }

    geometry.attributes.position.needsUpdate = true;

    mesh.rotation.y += 0.002;

    renderer.render(scene, camera);
  }

  animate();
};

// resize
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
